name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'
      - name: Build APK
        run: gradle assembleDebug 2>&1 || true
      - name: Show errors
        if: always()
        run: find . -name "*.txt" -path "*/reports/*" | xargs cat 2>/dev/null | head -100
      - uses: actions/upload-artifact@v4
        with:
          name: NightVisionCamera-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn
