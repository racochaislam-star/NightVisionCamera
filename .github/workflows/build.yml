name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Make gradlew
        run: printf '#!/bin/sh\nexec gradle "$@"\n' > gradlew && chmod +x gradlew
      - name: Build APK
        run: ./gradlew assembleDebug
      - uses: actions/upload-artifact@v3
        with:
          name: NightVisionCamera-debug
          path: app/build/outputs/apk/debug/app-debug.apk
